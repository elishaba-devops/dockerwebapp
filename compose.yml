version: "3.9"

services:

  devopsdb:
    image: elishababoddu2615/automation:db
    ports:
      - "3306:3306"
    deploy:
      replicas: 1
      restart_policy:
        condition: any
    networks:
      - mynetwork

  application:
    image: elishababoddu2615/automation:app
    ports:
      - "1111:8080"
    deploy:
      replicas: 3
      restart_policy:
        condition: any
      update_config:
        parallelism: 1
        delay: 10s
    depends_on:
      - devopsdb
    networks:
      - mynetwork

networks:
  mynetwork:
    driver: overlay
